# DataSource Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:quant_core}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:p@ssw0rd}
# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:p@ssw0rd}
# Spring AI
spring.ai.openai.api-key=${OPENAI_API_KEY:dummy-not-used-yet}
# Actuator + Prometheus（Metrics）
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.prometheus.metrics.export.enabled=true
management.endpoint.metrics.enabled=true
management.endpoint.health.show-details=always
# OpenTelemetry（Traces）
management.otlp.tracing.endpoint=${OTEL_ENDPOINT:http://localhost:4318/v1/traces}
management.tracing.sampling.probability=1.0
# Binance API Circuit Breaker：最近 10 次 / 失敗率 > 50% OPEN / 冷卻 30 秒 / HALF_OPEN 時允許 3 次測試請求
resilience4j.circuitbreaker.instances.binanceApi.sliding-window-size=10
resilience4j.circuitbreaker.instances.binanceApi.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.binanceApi.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.binanceApi.permitted-number-of-calls-in-half-open-state=3
# 熔斷Retry：最多重試 3 次 / 間隔 2 秒 / 只對 Server Error 和 IO 錯誤重試
resilience4j.retry.instances.binanceApi.max-attempts=3
resilience4j.retry.instances.binanceApi.wait-duration=2s
resilience4j.retry.instances.binanceApi.retry-exceptions[0]=org.springframework.web.client.HttpServerErrorException
resilience4j.retry.instances.binanceApi.retry-exceptions[1]=java.io.IOException
# Trading pairs
market.data.symbols=BTCUSDT,ETHUSDT,SOLUSDT
# StatArbProperties
app.statarb.pairs[0].symbol-a=BTCUSDT
app.statarb.pairs[0].symbol-b=ETHUSDT
app.statarb.pairs[0].zscore-threshold=2.0
app.statarb.pairs[0].zscore-exit-threshold=0.5
app.statarb.pairs[0].lookback-size=30
app.statarb.pairs[1].symbol-a=SOLUSDT
app.statarb.pairs[1].symbol-b=BTCUSDT
app.statarb.pairs[1].zscore-threshold=2.0
app.statarb.pairs[1].zscore-exit-threshold=0.5
app.statarb.pairs[1].lookback-size=30
# OnChainProperties
app.onchain.fear-greed.bullish-threshold=25
app.onchain.fear-greed.bearish-threshold=75
# Schedule Params
# app.scheduler.statarb.cron=*/30 * * * * *
app.scheduler.statarb.cron=* * * ? * *
app.scheduler.onchain.cron=0 */5 * * * *
