spring.application.name=quant-core
spring.mvc.servlet.load-on-startup=1
# DataSource Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:quant_core}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:p@ssw0rd}
spring.datasource.driver-class-name=org.postgresql.Driver
# HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
# JPA
spring.jpa.hibernate.ddl-auto=validate
# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD:p@ssw0rd}
# Spring Batch schema.sql
spring.sql.init.mode=always
# Actuator + Prometheus（Metrics）
management.endpoints.web.exposure.include=health,info,prometheus
# Batch Job 指標自動收集（Job 執行次數、成功/失敗、耗時）
management.metrics.tags.application=${spring.application.name}
# OpenTelemetry（Traces）
management.otlp.tracing.endpoint=http://localhost:4318/v1/traces
management.tracing.sampling.probability=1.0