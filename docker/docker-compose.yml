name: quant-core

services:
  postgres:
    image: postgres:16
    container_name: quant-postgres
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: quant-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:latest
    container_name: quant-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../Grafana/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  tempo:
    image: grafana/tempo:latest
    container_name: quant-tempo
    ports:
      - "3200:3200"   
      - "4317:4317"
      - "4318:4318"      
    command: -config.file=/etc/tempo.yaml
    volumes:
      - ../Grafana/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo

  loki:
    image: grafana/loki:latest
    container_name: quant-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki

  promtail:
    image: grafana/promtail:latest
    container_name: quant-promtail
    volumes:
      - ../backend/quant-core/logs:/logs:ro
      - ../Grafana/promtail.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: quant-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - tempo
      - loki

volumes:
  postgres_data:
  grafana_data:
  tempo_data:
  loki_data: